<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>معاينة تصميم الشهادة الأكاديمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        canvas {
            background: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            margin-top: 15px;
        }

        h2 {
            margin: 0;
            color: #3b82f6;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>معاينة التصميم الحقيقي للشهادة الأكاديمية (رسم حي عبر Canvas)</h2>
        <canvas id="certCanvas" width="1414" height="2000" style="width: 707px; height: 1000px;"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('certCanvas');
        const ctx = canvas.getContext('2d');
        const W = 1414;
        const H = 2000;

        // Dummy Data
        const universityName = "جامعة بغداد";
        const collegeName = "كلية الهندسة";
        const departmentName = "قسم هندسة الحاسوب";
        const studentName = "أحمد علي جاسم محمد";
        const studentNumber = "U-2025-04921";
        const studyType = "صباحي";
        const stageName = "المرحلة الرابعة";
        const academicYear = "2025/2026";
        const overallGrade = "جيد جداً";
        const isPassed = true;

        const results = [
            { courses: { name: 'شبكات الحاسوب', units: 3 }, score: 92, grade_label: 'امتياز' },
            { courses: { name: 'أنظمة التشغيل', units: 3 }, score: 85, grade_label: 'جيد جداً' },
            { courses: { name: 'قواعد البيانات', units: 2 }, score: 78, grade_label: 'جيد' },
            { courses: { name: 'هندسة البرمجيات', units: 3 }, score: 68, grade_label: 'متوسط' },
            { courses: { name: 'الذكاء الاصطناعي', units: 3 }, score: 88, grade_label: 'جيد جداً' }
        ];

        // 1. Draw helper functions
        const drawGeometricSeal = (ctx, cx, cy, r, primaryColor = '#0F172A', accentColor = '#C9A84C', drawOuterBorders = false) => {
            ctx.strokeStyle = primaryColor;
            ctx.lineWidth = r * 0.06;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, 2 * Math.PI);
            ctx.stroke();

            ctx.strokeStyle = accentColor;
            ctx.lineWidth = r * 0.03;
            ctx.beginPath();
            ctx.arc(cx, cy, r * 0.82, 0, 2 * Math.PI);
            ctx.stroke();

            for (let i = 0; i < 12; i++) {
                const angle = (i * Math.PI * 2) / 12;
                ctx.strokeStyle = accentColor;
                ctx.lineWidth = r * 0.025;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(angle) * r * 0.82, cy + Math.sin(angle) * r * 0.82);
                ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
                ctx.stroke();
            }

            ctx.fillStyle = accentColor;
            const starPoints = 8;
            const innerR = r * 0.22;
            const outerR = r * 0.42;
            ctx.beginPath();
            for (let i = 0; i < starPoints * 2; i++) {
                const angle = (i * Math.PI) / starPoints - Math.PI / 2;
                const radius = i % 2 === 0 ? outerR : innerR;
                if (i === 0) ctx.moveTo(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
                else ctx.lineTo(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
            }
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = primaryColor;
            ctx.beginPath();
            ctx.arc(cx, cy, r * 0.12, 0, 2 * Math.PI);
            ctx.fill();

            // Draw outer decorative borders (to match the logo image frame)
            if (drawOuterBorders) {
                const scale = r / 80;
                ctx.strokeStyle = accentColor;
                ctx.lineWidth = 5 * scale;
                ctx.beginPath();
                ctx.arc(cx, cy, r + 6 * scale, 0, 2 * Math.PI);
                ctx.stroke();

                ctx.strokeStyle = primaryColor;
                ctx.lineWidth = 2 * scale;
                ctx.beginPath();
                ctx.arc(cx, cy, r + 14 * scale, 0, 2 * Math.PI);
                ctx.stroke();
            }
        };

        const roundRect = (x, y, w, h, r) => {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        };

        const drawCorner = (x, y, dx, dy) => {
            ctx.fillStyle = '#C9A84C';
            ctx.fillRect(x, y, dx * 70, dy * 5);
            ctx.fillRect(x, y, dx * 5, dy * 70);
            ctx.fillRect(x + dx * 18, y + dy * 18, dx * 34, dy * 3);
            ctx.fillRect(x + dx * 18, y + dy * 18, dx * 3, dy * 34);
            ctx.beginPath();
            ctx.arc(x + dx * 58, y + dy * 58, 5, 0, 2 * Math.PI);
            ctx.fill();
        };

        // Render logic
        const render = () => {
            // Background
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, W, H);

            // Double Border
            ctx.strokeStyle = '#0F172A';
            ctx.lineWidth = 10;
            ctx.strokeRect(38, 38, W - 76, H - 76);

            ctx.strokeStyle = '#C9A84C';
            ctx.lineWidth = 3;
            ctx.strokeRect(56, 56, W - 112, H - 112);

            // Corners
            drawCorner(66, 66, 1, 1);
            drawCorner(W - 66, 66, -1, 1);
            drawCorner(66, H - 66, 1, -1);
            drawCorner(W - 66, H - 66, -1, -1);

            // Faint Watermark
            ctx.save();
            ctx.globalAlpha = 0.03;
            drawGeometricSeal(ctx, W / 2, H / 2 + 80, 260, '#0F172A', '#C9A84C');
            ctx.restore();

            // Logos (Geometric Seals as fallback placeholder design with outer borders)
            const logoSize = 160;
            const logoCY = 180;
            drawGeometricSeal(ctx, 200, logoCY, logoSize / 2, '#0F172A', '#C9A84C', true);
            drawGeometricSeal(ctx, W - 200, logoCY, logoSize / 2, '#1E3A8A', '#C9A84C', true);

            // Header Text
            ctx.fillStyle = '#1E293B';
            ctx.textAlign = 'center';
            ctx.font = 'bold 26px Tajawal, Arial, sans-serif';
            ctx.fillText(universityName, 200, logoCY + logoSize / 2 + 36);
            ctx.fillText(collegeName, W - 200, logoCY + logoSize / 2 + 36);

            ctx.font = '28px Tajawal, Arial, sans-serif';
            ctx.fillStyle = '#475569';
            ctx.fillText('وزارة التعليم العالي والبحث العلمي', W / 2, 100);

            ctx.fillStyle = '#0F172A';
            ctx.font = 'bold 34px Tajawal, Arial, sans-serif';
            ctx.fillText('بسم الله الرحمن الرحيم', W / 2, 155);

            ctx.font = '24px Tajawal, Arial, sans-serif';
            ctx.fillStyle = '#475569';
            ctx.fillText(`قسم ${departmentName} | الدراسة: ${studyType} | المرحلة: ${stageName}`, W / 2, logoCY + logoSize / 2 + 36);

            // Divider Line
            const dividerY = logoCY + logoSize / 2 + 66;
            ctx.strokeStyle = '#C9A84C';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(100, dividerY);
            ctx.lineTo(W / 2 - 60, dividerY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(W / 2 + 60, dividerY);
            ctx.lineTo(W - 100, dividerY);
            ctx.stroke();

            ctx.fillStyle = '#C9A84C';
            ctx.beginPath();
            ctx.moveTo(W / 2, dividerY - 14);
            ctx.lineTo(W / 2 + 14, dividerY);
            ctx.lineTo(W / 2, dividerY + 14);
            ctx.lineTo(W / 2 - 14, dividerY);
            ctx.closePath();
            ctx.fill();

            // Title Banner
            const titleY = dividerY + 55;
            const titleText = `وثيقة نتائج امتحانات الطلبة للعام الدراسي ${academicYear}`;
            ctx.font = 'bold 40px Tajawal, Arial, sans-serif';
            const titleW = ctx.measureText(titleText).width;

            const bannerPadX = 80;
            const bW = titleW + bannerPadX * 2;
            const bH = 80;
            const bX = W / 2 - bW / 2;
            const bY = titleY - 10;
            const bR = 16;

            ctx.fillStyle = 'rgba(201,168,76,0.06)';
            roundRect(bX, bY, bW, bH, bR);
            ctx.fill();
            ctx.strokeStyle = 'rgba(201,168,76,0.4)';
            ctx.lineWidth = 2;
            roundRect(bX, bY, bW, bH, bR);
            ctx.stroke();

            ctx.fillStyle = '#0F172A';
            ctx.fillText(titleText, W / 2, titleY + bH / 2 + 2);

            // Student details
            const studentY = bY + bH + 46;
            ctx.font = 'bold 30px Tajawal, Arial, sans-serif';
            ctx.fillStyle = '#1E293B';
            ctx.textAlign = 'right';
            ctx.fillText(`اسم الطالب: ${studentName}`, W - 110, studentY);
            ctx.textAlign = 'left';
            ctx.fillText(`الرقم الجامعي: ${studentNumber}`, 110, studentY);

            // Draw Table
            const drawTable = (items, startY) => {
                const tableLeft = 80;
                const tableRight = W - 80;
                const tableWidth = tableRight - tableLeft;
                const colW = tableWidth / items.length;
                const headerH = 84;
                const cellH = 84;

                const gradeColors = {
                    'امتياز': '#D97706',
                    'جيد جداً': '#059669',
                    'جيد': '#2563EB',
                    'متوسط': '#D97706',
                    'مقبول': '#6B7280',
                    'ضعيف': '#DC2626',
                };

                items.forEach((item, i) => {
                    const x = tableLeft + i * colW;

                    // Header
                    ctx.fillStyle = '#0F172A';
                    ctx.fillRect(x, startY, colW, headerH);
                    ctx.fillStyle = '#C9A84C';
                    ctx.fillRect(x, startY, colW, 4);
                    ctx.strokeStyle = '#1E293B';
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(x, startY, colW, headerH);

                    ctx.fillStyle = '#FFFFFF';
                    ctx.textAlign = 'center';
                    ctx.font = 'bold 22px Tajawal, Arial, sans-serif';
                    ctx.fillText(item.courses.name, x + colW / 2, startY + 38);

                    ctx.fillStyle = '#94A3B8';
                    ctx.font = '18px Tajawal, Arial, sans-serif';
                    ctx.fillText(`(${item.courses.units} وحدة)`, x + colW / 2, startY + 68);

                    // Cell
                    const cellBg = i % 2 === 0 ? '#F8FAFC' : '#F1F5F9';
                    ctx.fillStyle = cellBg;
                    ctx.fillRect(x, startY + headerH, colW, cellH);
                    ctx.strokeStyle = '#E2E8F0';
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(x, startY + headerH, colW, cellH);

                    ctx.fillStyle = '#334155';
                    ctx.font = 'bold 20px Tajawal, Arial, sans-serif';
                    ctx.fillText(item.score, x + colW / 2, startY + headerH + 28);

                    // Badge
                    const grade = item.grade_label;
                    const gc = gradeColors[grade] || '#6B7280';
                    const badgeW = Math.min(colW - 24, 150);
                    const badgeH = 38;
                    const badgeX = x + (colW - badgeW) / 2;
                    const badgeY = startY + headerH + cellH - badgeH - 10;
                    const br = badgeH / 2;

                    ctx.fillStyle = gc + '22';
                    roundRect(badgeX, badgeY, badgeW, badgeH, br);
                    ctx.fill();
                    ctx.strokeStyle = gc;
                    ctx.lineWidth = 1.5;
                    roundRect(badgeX, badgeY, badgeW, badgeH, br);
                    ctx.stroke();

                    ctx.fillStyle = gc;
                    ctx.font = 'bold 18px Tajawal, Arial, sans-serif';
                    ctx.fillText(grade, x + colW / 2, badgeY + badgeH / 2 + 6);
                });
            };

            const tableStartY = studentY + 34;
            drawTable(results, tableStartY);

            // Overall Result
            const resultY = tableStartY + 168 + 60;
            const statusColor = isPassed ? '#059669' : '#DC2626';
            const statusText = isPassed ? '✓ ناجح' : '✗ راسب';

            const overallColors = {
                'امتياز': '#D97706',
                'جيد جداً': '#059669',
                'جيد': '#2563EB',
                'متوسط': '#D97706',
                'مقبول': '#6B7280',
                'ضعيف': '#DC2626',
            };
            const overallColor = overallColors[overallGrade] || '#475569';

            const drawResultPill = (label, value, color, cx) => {
                const pillW = 340;
                const pillH = 68;
                const pillX = cx - pillW / 2;
                const pillY = resultY;

                ctx.fillStyle = color + '15';
                roundRect(pillX, pillY, pillW, pillH, pillH / 2);
                ctx.fill();
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                roundRect(pillX, pillY, pillW, pillH, pillH / 2);
                ctx.stroke();

                ctx.fillStyle = '#475569';
                ctx.font = '22px Tajawal, Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(label, cx, pillY + 26);

                ctx.fillStyle = color;
                ctx.font = 'bold 28px Tajawal, Arial, sans-serif';
                ctx.fillText(value, cx, pillY + 58);
            };

            drawResultPill('النتيجة الكلية', statusText, statusColor, W / 2 - 220);
            drawResultPill('التقدير العام', overallGrade, overallColor, W / 2 + 220);

        };

        // Wait for fonts to load
        document.fonts.ready.then(() => {
            render();
        });
    </script>
</body>

</html>
